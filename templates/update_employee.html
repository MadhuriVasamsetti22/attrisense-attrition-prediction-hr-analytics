<!DOCTYPE html>
<html>
<head>
    <title>Update Employee</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/employees">Employees</a>
</div>

<div class="container">
<h2>Update Employee</h2>

<form method="POST">
Name: <input type="text" name="name" value="{{emp[1]}}"><br>
Age: <input type="number" name="age" value="{{emp[2]}}"><br>
Department: <input type="text" name="department" value="{{emp[3]}}"><br>
Salary: <input type="number" name="salary" value="{{emp[4]}}"><br>
Experience: <input type="number" name="experience" value="{{emp[5]}}"><br>
Performance: <input type="number" name="performance" value="{{emp[6]}}"><br>
Attrition: <input type="number" name="attrition" value="{{emp[7]}}"><br>

<input type="submit" value="Update Employee">
</form>
</div>
<script>
function toggleTheme() {
    document.body.classList.toggle("dark");
}
</script>
</body>
</html>
